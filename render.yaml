services:
  - type: web
    name: telegraph-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: TELEGRAPH_ACCESS_TOKEN
        sync: false
      - key: TELEGRAPH_AUTHOR_NAME
        value: Telegraph Bot
      - key: MAX_UPLOAD_RETRIES
        value: "3"
      - key: REQUEST_TIMEOUT_SECONDS
        value: "30"
      - key: LOG_LEVEL
        value: INFO
